<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOMB DEFUSAL</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- タイトル画面 -->
  <div class="screen" id="title-screen">
    <div class="title-shell">
      <div class="title-logo">
        <p class="title-kicker">2 PLAYERS CO-OP</p>
        <h1>
          <span class="title-main">BOMB</span>
          <span class="title-submain">DEFUSAL</span>
        </h1>
        <p class="subtitle">協力して爆弾を解除せよ</p>
      </div>

      <div class="title-actions">
        <button id="btn-create" class="title-button title-button-primary" type="button">
          <span class="menu-en">New Game</span>
          <span class="menu-ja">ルームを作成</span>
        </button>
        <div class="join-box title-join" id="join-panel">
          <div class="join-controls">
            <input type="text" id="input-room" placeholder="ROOM CODE" maxlength="6" autocomplete="off" />
            <button id="btn-join" class="title-button title-button-secondary" type="button">
              <span class="menu-en">Load Game</span>
              <span class="menu-ja">参加</span>
            </button>
          </div>
        </div>
        <p id="room-info" class="title-room-info"></p>
      </div>
      <div class="title-footer" aria-hidden="true">
        <span>© 2026 BOMB DEFUSAL PROJECT</span>
      </div>
    </div>
  </div>

  <!-- ロール選択画面 -->
  <div class="screen hidden" id="role-screen">
    <h2>ロールを選択</h2>
    <button id="btn-role-a">💣 爆弾担当（A）</button>
    <button id="btn-role-b">📖 マニュアル担当（B）</button>
    <p id="role-info"></p>
  </div>

  <!-- ゲーム画面-->
  <div class="screen hidden" id="game-screen">
    <div class="hud">
      <span id="hud-timer">⏱ 05:00</span>
      <span id="hud-mistakes">ミス: 0/3</span>
      <span id="hud-room"></span>
    </div>
    <div id="game-body"></div>
  </div>

  <!-- 結果画面 -->
  <div class="screen hidden" id="result-screen">
    <h1 id="result-title"></h1>
    <p id="result-detail"></p>
    <button onclick="location.reload()">タイトルへ戻る</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/bomb-ui.js"></script>
  <script src="js/manual-ui.js"></script>
  <script>
    Socket.connect();

    const screens = {
      title: document.getElementById("title-screen"),
      role: document.getElementById("role-screen"),
      game: document.getElementById("game-screen"),
      result: document.getElementById("result-screen"),
    };
    function show(name) {
      Object.values(screens).forEach((s) => s.classList.add("hidden"));
      screens[name].classList.remove("hidden");
    }

    let myRole = null;
    let joinInputOpen = false;

    const joinPanel = document.getElementById("join-panel");
    const roomInput = document.getElementById("input-room");
    const roomInfo = document.getElementById("room-info");

    function openJoinInput() {
      joinInputOpen = true;
      joinPanel.classList.add("is-open");
      roomInput.focus();
    }

    function renderRoomCode(roomId) {
      roomInfo.replaceChildren();

      const label = document.createElement("span");
      label.className = "room-label";
      label.textContent = "ROOM CODE";

      const code = document.createElement("span");
      code.className = "room-code";
      code.textContent = roomId;

      const help = document.createElement("span");
      help.className = "room-help";
      help.textContent = "相手にこのコードを伝えてください";

      roomInfo.append(label, code, help);
      roomInfo.classList.add("is-visible");
    }

    document.getElementById("btn-create").onclick = () => {
      joinPanel.classList.remove("is-open");
      joinInputOpen = false;
      roomInfo.classList.remove("is-visible");
      roomInfo.textContent = "";
      Socket.send("room:create");
    };
    document.getElementById("btn-join").onclick = () => {
      if (!joinInputOpen) {
        openJoinInput();
        return;
      }
      const roomId = roomInput.value.trim().toUpperCase();
      if (roomId) Socket.send("room:join", { roomId });
    };
    roomInput.onkeydown = (event) => {
      if (event.key !== "Enter") return;
      const roomId = roomInput.value.trim().toUpperCase();
      if (roomId) Socket.send("room:join", { roomId });
    };
    document.getElementById("btn-role-a").onclick = () => Socket.send("role:select", { role: "A" });
    document.getElementById("btn-role-b").onclick = () => Socket.send("role:select", { role: "B" });

    Socket.on("room:created", (p) => {
      roomInput.value = p.roomId;
      renderRoomCode(p.roomId);
    });
    Socket.on("room:joined", (p) => {
      if (p.players >= 2) show("role");
    });
    Socket.on("role:confirmed", (p) => {
      document.getElementById("role-info").textContent =
        `あなたは ${p.role} を選択。相手の選択を待っています...`;
    });
    Socket.on("game:start", (p) => {
      myRole = p.role;
      document.getElementById("hud-room").textContent = "ROOM: " + (document.getElementById("input-room").value.toUpperCase() || "—");
      show("game");
      const body = document.getElementById("game-body");
      if (myRole === "A") {
        BombUI.render(body, p.data);   // 爆弾操作画面
      } else {
        ManualUI.render(body, p.data); // マニュアル画面
      }
      updateHud(p.state);
    });

    Socket.on("puzzle:result", (p) => {
      updateHud(p.state);
      if (myRole === "A") BombUI.onResult(p);
    });

    // 毎秒のタイマー同期
    Socket.on("game:state", (p) => {
      updateHud(p.state);
    });

    Socket.on("game:clear", (p) => {
      show("result");
      document.getElementById("result-title").textContent = "🎉 DEFUSED!";
      document.getElementById("result-detail").textContent =
        `解除成功！ 残りミス: ${p.mistakes}/3`;
    });
    Socket.on("game:over", (p) => {
      show("result");
      document.getElementById("result-title").textContent = "💥 BOOM!";
      document.getElementById("result-detail").textContent =
        p.reason === "mistakes" ? "ミスが3回に達しました…" : "時間切れです…";
    });
    Socket.on("player:left", () => alert("相手が切断しました"));
    Socket.on("error", (p) => alert("エラー: " + p.message));

    function updateHud(state) {
      if (!state) return;
      document.getElementById("hud-mistakes").textContent =
        `ミス: ${state.mistakes}/${state.maxMistakes}`;
      const m = String(Math.floor(state.timeLeft / 60)).padStart(2, "0");
      const s = String(state.timeLeft % 60).padStart(2, "0");
      const timerEl = document.getElementById("hud-timer");
      timerEl.textContent = `⏱ ${m}:${s}`;
      // 残り30秒で警告表示（点滅）
      if (state.timeLeft <= 30) {
        timerEl.classList.add("danger");
      } else {
        timerEl.classList.remove("danger");
      }
      if (myRole === "A") BombUI.syncCasingHud(state);
    }
  </script>
</body>
</html>
