<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOMB DEFUSAL</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- タイトル画面 -->
  <div class="screen" id="title-screen">
    <div class="title-shell">
      <div class="title-logo">
        <p class="title-kicker">2 PLAYERS CO-OP</p>
        <h1>
          <span class="title-main">BOMB</span>
          <span class="title-submain">DEFUSAL</span>
        </h1>
        <p class="subtitle">協力して爆弾を解除せよ</p>
      </div>

      <div class="title-actions">
        <button id="btn-create" class="title-button title-button-primary" type="button">
          <span class="menu-en">New Game</span>
          <span class="menu-ja">ルームを作成</span>
        </button>
        <div class="join-box title-join" id="join-panel">
          <div class="join-controls">
            <input type="text" id="input-room" placeholder="ROOM CODE" maxlength="6" autocomplete="off" />
            <button id="btn-join" class="title-button title-button-secondary" type="button">
              <span class="menu-en">Load Game</span>
              <span class="menu-ja">参加</span>
            </button>
          </div>
        </div>
        <p id="room-info" class="title-room-info"></p>
      </div>
      <div class="title-footer" aria-hidden="true">
        <span>© 2026 BOMB DEFUSAL PROJECT</span>
      </div>
    </div>
  </div>

  <!-- ロール選択画面 -->
  <div class="screen hidden" id="role-screen">
    <div class="role-shell">
      <header class="role-heading">
        <p class="role-kicker">MISSION ASSIGNMENT</p>
        <h2><span>SELECT</span> ROLE</h2>
        <p class="role-subtitle">担当を選択</p>
      </header>

      <div class="role-options" aria-label="担当を選択">
        <button id="btn-role-a" class="role-option" type="button" aria-describedby="role-a-description">
          <span class="role-number">A</span>
          <span class="role-option-copy">
            <span class="role-option-en">Bomb Operator</span>
            <span class="role-option-ja">爆弾担当</span>
            <span class="role-option-description" id="role-a-description">爆弾を調べて解除装置を操作する</span>
          </span>
          <span class="role-select-mark" aria-hidden="true">SELECT</span>
        </button>

        <button id="btn-role-b" class="role-option" type="button" aria-describedby="role-b-description">
          <span class="role-number">B</span>
          <span class="role-option-copy">
            <span class="role-option-en">Manual Expert</span>
            <span class="role-option-ja">マニュアル担当</span>
            <span class="role-option-description" id="role-b-description">解除マニュアルを読み解いて指示を伝える</span>
          </span>
          <span class="role-select-mark" aria-hidden="true">SELECT</span>
        </button>
      </div>

      <div class="role-status" aria-live="polite">
        <p class="role-room">ROOM <span id="role-room-code">------</span></p>
        <p id="role-info">担当を選んでください</p>
      </div>

      <div class="role-footer" aria-hidden="true">2 PLAYERS CO-OP</div>
    </div>
  </div>

  <!-- ゲーム画面-->
  <div class="screen hidden" id="game-screen">
    <div class="hud">
      <span id="hud-timer">⏱ 05:00</span>
      <span id="hud-mistakes">ミス: 0/3</span>
      <span id="hud-room"></span>
    </div>
    <div id="game-body"></div>
  </div>

  <!-- 結果画面 -->
  <div class="screen hidden" id="result-screen" data-outcome="success">
    <div class="result-shell">
      <header class="result-heading">
        <p class="result-kicker" id="result-kicker">MISSION COMPLETE</p>
        <div class="result-emblem" id="result-emblem" aria-hidden="true">✓</div>
        <h1 id="result-title">DEFUSED</h1>
        <p class="result-headline" id="result-headline">爆弾解除成功</p>
      </header>

      <p class="result-detail" id="result-detail"></p>

      <div class="result-stats" aria-label="ゲーム結果">
        <div class="result-stat">
          <span class="result-stat-label">TIME LEFT</span>
          <strong id="result-time">00:00</strong>
          <span>残り時間</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-label">MISTAKES</span>
          <strong id="result-mistakes">0 / 3</strong>
          <span>ミス回数</span>
        </div>
      </div>

      <button class="result-button" type="button" onclick="location.reload()">
        <span>Return to Title</span>
        <small>タイトルへ戻る</small>
      </button>

      <div class="result-footer" aria-hidden="true">BOMB DEFUSAL PROJECT</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/bomb-ui.js"></script>
  <script src="js/manual-ui.js"></script>
  <script>
    Socket.connect();

    const screens = {
      title: document.getElementById("title-screen"),
      role: document.getElementById("role-screen"),
      game: document.getElementById("game-screen"),
      result: document.getElementById("result-screen"),
    };
    function show(name) {
      Object.values(screens).forEach((s) => s.classList.add("hidden"));
      screens[name].classList.remove("hidden");
    }

    let myRole = null;
    let lastGameState = null;
    let joinInputOpen = false;

    const joinPanel = document.getElementById("join-panel");
    const roomInput = document.getElementById("input-room");
    const roomInfo = document.getElementById("room-info");

    function openJoinInput() {
      joinInputOpen = true;
      joinPanel.classList.add("is-open");
      roomInput.focus();
    }

    function renderRoomCode(roomId) {
      roomInfo.replaceChildren();

      const label = document.createElement("span");
      label.className = "room-label";
      label.textContent = "ROOM CODE";

      const code = document.createElement("span");
      code.className = "room-code";
      code.textContent = roomId;

      const help = document.createElement("span");
      help.className = "room-help";
      help.textContent = "相手にこのコードを伝えてください";

      roomInfo.append(label, code, help);
      roomInfo.classList.add("is-visible");
    }

    document.getElementById("btn-create").onclick = () => {
      joinPanel.classList.remove("is-open");
      joinInputOpen = false;
      roomInfo.classList.remove("is-visible");
      roomInfo.textContent = "";
      Socket.send("room:create");
    };
    document.getElementById("btn-join").onclick = () => {
      if (!joinInputOpen) {
        openJoinInput();
        return;
      }
      const roomId = roomInput.value.trim().toUpperCase();
      if (roomId) Socket.send("room:join", { roomId });
    };
    roomInput.onkeydown = (event) => {
      if (event.key !== "Enter") return;
      const roomId = roomInput.value.trim().toUpperCase();
      if (roomId) Socket.send("room:join", { roomId });
    };
    document.getElementById("btn-role-a").onclick = () => Socket.send("role:select", { role: "A" });
    document.getElementById("btn-role-b").onclick = () => Socket.send("role:select", { role: "B" });

    function renderSelectedRole(role) {
      document.querySelectorAll(".role-option").forEach((button) => {
        button.classList.toggle("is-selected", button.id === `btn-role-${role.toLowerCase()}`);
        button.disabled = true;
      });
    }

    Socket.on("room:created", (p) => {
      roomInput.value = p.roomId;
      renderRoomCode(p.roomId);
    });
    Socket.on("room:joined", (p) => {
      if (p.players >= 2) {
        document.getElementById("role-room-code").textContent = p.roomId;
        show("role");
      }
    });
    Socket.on("role:confirmed", (p) => {
      renderSelectedRole(p.role);
      const roleName = p.role === "A" ? "爆弾担当" : "マニュアル担当";
      document.getElementById("role-info").textContent =
        `${roleName}を選択しました。相手を待っています...`;
    });
    Socket.on("game:start", (p) => {
      myRole = p.role;
      document.getElementById("hud-room").textContent = "ROOM: " + (document.getElementById("input-room").value.toUpperCase() || "—");
      show("game");
      const body = document.getElementById("game-body");
      if (myRole === "A") {
        BombUI.render(body, p.data);   // 爆弾操作画面
      } else {
        ManualUI.render(body, p.data); // マニュアル画面
      }
      updateHud(p.state);
    });

    Socket.on("puzzle:result", (p) => {
      updateHud(p.state);
      if (myRole === "A") BombUI.onResult(p);
    });

    // 毎秒のタイマー同期
    Socket.on("game:state", (p) => {
      updateHud(p.state);
    });

    function formatResultTime(seconds) {
      const safeSeconds = Math.max(0, Number(seconds) || 0);
      const minutes = String(Math.floor(safeSeconds / 60)).padStart(2, "0");
      const remainder = String(safeSeconds % 60).padStart(2, "0");
      return `${minutes}:${remainder}`;
    }

    function renderResult(outcome, payload = {}) {
      const success = outcome === "success";
      const state = lastGameState || {};
      const timeLeft = payload.timeLeft ?? state.timeLeft ?? 0;
      const mistakes = payload.mistakes ?? state.mistakes ?? (payload.reason === "mistakes" ? 3 : 0);

      screens.result.dataset.outcome = outcome;
      document.getElementById("result-kicker").textContent = success ? "MISSION COMPLETE" : "MISSION FAILED";
      document.getElementById("result-emblem").textContent = success ? "✓" : "!";
      document.getElementById("result-title").textContent = success ? "DEFUSED" : "DETONATED";
      document.getElementById("result-headline").textContent = success ? "爆弾解除成功" : "解除失敗";
      document.getElementById("result-detail").textContent = success
        ? "チームの連携により、爆発を阻止しました。"
        : payload.reason === "mistakes"
          ? "ミスが3回に達し、爆弾が起爆しました。"
          : "制限時間内に解除できませんでした。";
      document.getElementById("result-time").textContent = formatResultTime(timeLeft);
      document.getElementById("result-mistakes").textContent = `${mistakes} / 3`;
    }

    Socket.on("game:clear", (p) => {
      renderResult("success", p);
      show("result");
    });
    Socket.on("game:over", (p) => {
      renderResult("failure", p);
      show("result");
    });
    Socket.on("player:left", () => alert("相手が切断しました"));
    Socket.on("error", (p) => alert("エラー: " + p.message));

    function updateHud(state) {
      if (!state) return;
      lastGameState = { ...state };
      document.getElementById("hud-mistakes").textContent =
        `ミス: ${state.mistakes}/${state.maxMistakes}`;
      const m = String(Math.floor(state.timeLeft / 60)).padStart(2, "0");
      const s = String(state.timeLeft % 60).padStart(2, "0");
      const timerEl = document.getElementById("hud-timer");
      timerEl.textContent = `⏱ ${m}:${s}`;
      // 残り30秒で警告表示（点滅）
      if (state.timeLeft <= 30) {
        timerEl.classList.add("danger");
      } else {
        timerEl.classList.remove("danger");
      }
      if (myRole === "A") BombUI.syncCasingHud(state);
    }
  </script>
</body>
</html>
